# GPU experiment specifications for regularizedvi.
# Each entry defines one bsub job submitted via papermill.
#
# Fields:
#   job_name:    bsub -J name and wandb_name
#   notebook:    source notebook to execute
#   output:      output notebook path (papermill writes executed notebook here)
#   overrides:   extra papermill -r flags (empty = use notebook defaults)
#   description: what this ablation tests
#
# All experiments use variational LogNormal dispersion posterior (always active).
# New variables tested:
#   regularise_background: True/False — Gamma prior on additive background
#   library_log_means_centering_sensitivity: None (skip) / 1.0 (center to mean=0)

# ── Single-modal RNA: regularise_background x centering (4 experiments) ──

- job_name: exp1_rna_bg_noctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp1_out.ipynb
  overrides: "-r regularise_background 1 -r results_folder results/exp1_rna_bg_noctr/"
  description: >-
    regularise_background=True, centering=OFF.
    Background prior active, library prior at original scale (~7.5 log-mean).

- job_name: exp2_rna_nobg_noctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp2_out.ipynb
  overrides: "-r regularise_background 0 -r results_folder results/exp2_rna_nobg_noctr/"
  description: >-
    regularise_background=False, centering=OFF.
    No background prior, library prior at original scale.

- job_name: exp3_rna_bg_ctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp3_out.ipynb
  overrides: "-r regularise_background 1 -r library_log_means_centering_sensitivity 1.0 -r results_folder results/exp3_rna_bg_ctr/"
  description: >-
    regularise_background=True, centering=ON (sensitivity=1.0).
    Background prior active, library prior centered to mean=0 (encoder starts near prior).

- job_name: exp4_rna_nobg_ctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp4_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r results_folder results/exp4_rna_nobg_ctr/"
  description: >-
    regularise_background=False, centering=ON (sensitivity=1.0).
    No background prior, library prior centered to mean=0.

# ── Multimodal RNA+ATAC: centering variations (3 experiments) ──

- job_name: exp5_mm_noctr
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp5_out.ipynb
  overrides: "-r regularise_background 0 -r results_folder results/exp5_mm_noctr/"
  description: >-
    Multimodal baseline: regularise_background=False, centering=OFF for both modalities.
    Library priors at original scale.

- job_name: exp6_mm_ctr_rna
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp6_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r results_folder results/exp6_mm_ctr_rna/"
  description: >-
    Multimodal: regularise_background=False, centering=ON for RNA only (sensitivity=1.0).
    ATAC library prior at original scale. Tests whether RNA centering alone helps.

- job_name: exp7_mm_ctr_both
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp7_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r results_folder results/exp7_mm_ctr_both/"
  description: >-
    Multimodal: regularise_background=False, centering=ON for both modalities.
    RNA sensitivity=1.0, ATAC sensitivity=0.2.
    Tests whether centering both modalities (with lower ATAC sensitivity) improves joint latent.

# ── Lower early stopping sensitivity (10x less aggressive) ──

- job_name: exp8_mm_ctr_both_lowes
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp8_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r early_stopping_min_delta_per_feature 0.00003 -r results_folder results/exp8_mm_ctr_both_lowes/"
  description: >-
    Same as exp7 but with 10x lower early stopping sensitivity (0.00003 vs default 0.0003).
    Exp7 stopped at only 134 epochs — this tests whether longer training improves results.

- job_name: exp9_rna_nobg_ctr_lowes
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp9_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r early_stopping_min_delta_per_feature 0.00003 -r results_folder results/exp9_rna_nobg_ctr_lowes/"
  description: >-
    Same as exp4 (RNA, bg=F, centering=ON) but with 10x lower early stopping sensitivity.
    Tests whether RNA model also benefits from longer training.


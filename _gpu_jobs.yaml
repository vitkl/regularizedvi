# GPU experiment specifications for regularizedvi.
# Each entry defines one bsub job submitted via papermill.
#
# Fields:
#   job_name:    bsub -J name and wandb_name
#   notebook:    source notebook to execute
#   output:      output notebook path (papermill writes executed notebook here)
#   overrides:   extra papermill -r flags (empty = use notebook defaults)
#   description: what this ablation tests
#
# All experiments use variational LogNormal dispersion posterior (always active).
# New variables tested:
#   regularise_background: True/False — Gamma prior on additive background
#   library_log_means_centering_sensitivity: None (skip) / 1.0 (center to mean=0)

# ── Single-modal RNA: regularise_background x centering (4 experiments) ──

- job_name: exp1_rna_bg_noctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp1_out.ipynb
  overrides: "-r regularise_background 1 -r results_folder results/exp1_rna_bg_noctr/"
  description: >-
    regularise_background=True, centering=OFF.
    Background prior active, library prior at original scale (~7.5 log-mean).

- job_name: exp2_rna_nobg_noctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp2_out.ipynb
  overrides: "-r regularise_background 0 -r results_folder results/exp2_rna_nobg_noctr/"
  description: >-
    regularise_background=False, centering=OFF.
    No background prior, library prior at original scale.

- job_name: exp3_rna_bg_ctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp3_out.ipynb
  overrides: "-r regularise_background 1 -r library_log_means_centering_sensitivity 1.0 -r results_folder results/exp3_rna_bg_ctr/"
  description: >-
    regularise_background=True, centering=ON (sensitivity=1.0).
    Background prior active, library prior centered to mean=0 (encoder starts near prior).

- job_name: exp4_rna_nobg_ctr
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp4_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r results_folder results/exp4_rna_nobg_ctr/"
  description: >-
    regularise_background=False, centering=ON (sensitivity=1.0).
    No background prior, library prior centered to mean=0.

# ── Multimodal RNA+ATAC: centering variations (3 experiments) ──

- job_name: exp5_mm_noctr
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp5_out.ipynb
  overrides: "-r regularise_background 0 -r results_folder results/exp5_mm_noctr/"
  description: >-
    Multimodal baseline: regularise_background=False, centering=OFF for both modalities.
    Library priors at original scale.

- job_name: exp6_mm_ctr_rna
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp6_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r results_folder results/exp6_mm_ctr_rna/"
  description: >-
    Multimodal: regularise_background=False, centering=ON for RNA only (sensitivity=1.0).
    ATAC library prior at original scale. Tests whether RNA centering alone helps.

- job_name: exp7_mm_ctr_both
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp7_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r results_folder results/exp7_mm_ctr_both/"
  description: >-
    Multimodal: regularise_background=False, centering=ON for both modalities.
    RNA sensitivity=1.0, ATAC sensitivity=0.2.
    Tests whether centering both modalities (with lower ATAC sensitivity) improves joint latent.

# ── Lower early stopping sensitivity (10x less aggressive) ──

- job_name: exp8_mm_ctr_both_lowes
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp8_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r early_stopping_min_delta_per_feature 0.00003 -r results_folder results/exp8_mm_ctr_both_lowes/"
  description: >-
    Same as exp7 but with 10x lower early stopping sensitivity (0.00003 vs default 0.0003).
    Exp7 stopped at only 134 epochs — this tests whether longer training improves results.

- job_name: exp9_rna_nobg_ctr_lowes
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp9_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r early_stopping_min_delta_per_feature 0.00003 -r results_folder results/exp9_rna_nobg_ctr_lowes/"
  description: >-
    Same as exp4 (RNA, bg=F, centering=ON) but with 10x lower early stopping sensitivity.
    Tests whether RNA model also benefits from longer training.

# ── Wider library prior variance (hypothesis E) ──

- job_name: exp10a_mm_libvar_0.1
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp10a_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r library_log_vars_weight 0.1 -r results_folder results/exp10a_mm_libvar_0.1/"
  description: >-
    Same as exp7 + 2x wider library prior variance (weight=0.1 vs 0.05).
    Prior std goes from 0.105 to ~0.15.

- job_name: exp10b_mm_libvar_0.2
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp10b_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r library_log_vars_weight 0.2 -r results_folder results/exp10b_mm_libvar_0.2/"
  description: >-
    Same as exp7 + 4x wider library prior variance (weight=0.2 vs 0.05).
    Prior std goes from 0.105 to ~0.21.

- job_name: exp12_rna_libvar_0.2
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp12_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r library_log_vars_weight 0.2 -r results_folder results/exp12_rna_libvar_0.2/"
  description: >-
    Same as exp4 (RNA, bg=F, ctr=ON) + 4x wider library prior variance.
    Tests if wider lib var helps single-modal RNA too.

# ── Learnable per-modality scaling (hypothesis D) ──

- job_name: exp11_mm_learnable_scale
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp11_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r learnable_modality_scaling 1 -r results_folder results/exp11_mm_learnable_scale/"
  description: >-
    Same as exp7 + learnable per-modality size factor scaling.
    Init from centering sensitivity: RNA=1.0, ATAC=0.2.
    Gamma prior: RNA Gamma(5,5) mean=1.0, ATAC Gamma(5,25) mean=0.2.
    Applied to px_rate in generative (modifies expected counts).
    Tests whether learnable modality scaling prevents dispersion drift.

# ── Stratified validation split (hypothesis C) ──
# Same hyperparams as originals but with stratified train/val split by l1_cell_type+batch.
# Tests whether random validation cell selection was causing variable metrics.

- job_name: exp8stratified
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp8stratified_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r early_stopping_min_delta_per_feature 0.00003 -r stratify_validation_key l1_cell_type+batch -r results_folder results/exp8stratified/"
  description: >-
    Same as exp8 (MM, centering both, lowES=0.00003) + stratified validation split.
    Tests if stratified split changes early stopping behavior and dispersion drift.

- job_name: exp9stratified
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp9stratified_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r early_stopping_min_delta_per_feature 0.00003 -r stratify_validation_key l1_cell_type+batch -r results_folder results/exp9stratified/"
  description: >-
    Same as exp9 (RNA, centering ON, lowES=0.00003) + stratified validation split.
    Tests if stratified split changes early stopping behavior for RNA model.

- job_name: exp10bstratified
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp10bstratified_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r library_log_vars_weight 0.2 -r stratify_validation_key l1_cell_type+batch -r results_folder results/exp10bstratified/"
  description: >-
    Same as exp10b (MM, wider lib var 0.2) + stratified validation split.
    Tests if stratified split improves wider library variance experiment.

- job_name: exp12stratified
  notebook: docs/notebooks/model_comparisons/bone_marrow_gamma_poisson_early_stopping.ipynb
  output: docs/notebooks/model_comparisons/bone_marrow_gp_es_exp12stratified_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity 1.0 -r library_log_vars_weight 0.2 -r stratify_validation_key l1_cell_type+batch -r results_folder results/exp12stratified/"
  description: >-
    Same as exp12 (RNA, wider lib var 0.2) + stratified validation split.
    Tests if stratified split improves wider library variance for RNA model.

- job_name: exp11stratified
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp11stratified_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r learnable_modality_scaling 1 -r stratify_validation_key l1_cell_type+batch -r results_folder results/exp11stratified/"
  description: >-
    Same as exp11 (MM, learnable modality scaling) + stratified validation split.
    Tests if stratified split + learnable scaling together prevent dispersion drift.

# ── Stricter ATAC filtering (fragments > 2000) ──

- job_name: exp10bstratified_filtered
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp10bstratified_filtered_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r library_log_vars_weight 0.2 -r stratify_validation_key l1_cell_type+batch -r results_folder results/exp10bstratified_filtered/"
  description: >-
    Same as exp10bstratified but with stricter ATAC filtering (fragments > 2000 vs > 1000).
    Tests whether removing low-quality ATAC cells improves joint latent and attribution.

# ── Lower early stopping (3x smaller min_delta) + stratified ──

- job_name: exp10bstratified_lowes
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp10bstratified_lowes_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r library_log_vars_weight 0.2 -r stratify_validation_key l1_cell_type+batch -r early_stopping_min_delta_per_feature 0.0001 -r results_folder results/exp10bstratified_lowes/"
  description: >-
    Same as exp10bstratified + 3x lower ES (0.0001 vs 0.0003).
    Tests whether longer training with wider lib var + stratified split improves results.

- job_name: exp11stratified_lowes
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp11stratified_lowes_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r learnable_modality_scaling 1 -r stratify_validation_key l1_cell_type+batch -r early_stopping_min_delta_per_feature 0.0001 -r results_folder results/exp11stratified_lowes/"
  description: >-
    Same as exp11stratified + 3x lower ES (0.0001 vs 0.0003).
    Tests whether longer training with learnable scaling + stratified split improves results.

# ── Per-modality learning rate (hypothesis F) ──

- job_name: exp10bstratified_filtered_lowes_ataclr2
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp10bstratified_filtered_lowes_ataclr2_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r library_log_vars_weight 0.2 -r stratify_validation_key l1_cell_type+batch -r early_stopping_min_delta_per_feature 0.0001 -r modality_lr_multiplier_atac 2.0 -r results_folder results/exp10bstratified_filtered_lowes_ataclr2/"
  description: >-
    exp10bstratified_filtered + lowES (0.0001) + ATAC LR 2x.
    Tests whether 2x ATAC learning rate speeds up ATAC training without hurting RNA.
    Uses ATAC>2k filtering, stratified split, wider lib var 0.2.

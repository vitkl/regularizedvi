    Same as exp4 (RNA, bg=F, ctr=ON) + 4x wider library prior variance.
    Tests if wider lib var helps single-modal RNA too.

# ── Learnable per-modality scaling (hypothesis D) ──

- job_name: exp11_mm_learnable_scale
  notebook: docs/notebooks/bone_marrow_multimodal_tutorial_early_stopping.ipynb
  output: docs/notebooks/bone_marrow_mm_es_exp11_out.ipynb
  overrides: "-r regularise_background 0 -r library_log_means_centering_sensitivity_rna 1.0 -r library_log_means_centering_sensitivity_atac 0.2 -r learnable_modality_scaling 1 -r results_folder results/exp11_mm_learnable_scale/"
  description: >-
    Same as exp7 + learnable per-modality size factor scaling.
    Init from centering sensitivity: RNA=1.0, ATAC=0.2.
    Gamma prior: RNA Gamma(5,5) mean=1.0, ATAC Gamma(5,25) mean=0.2.
    Applied to px_rate in generative (modifies expected counts).
    Tests whether learnable modality scaling prevents dispersion drift.

